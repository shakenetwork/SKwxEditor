<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信公众号文章采集编辑器</title>
    <link href="css/tailwind.css" rel="stylesheet">
    <style>
        /* 核心布局样式 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        html, body {
            writing-mode: horizontal-tb !important;
            text-orientation: mixed !important;
        }
        
        /* iframe 编辑器容器 */
        .editor-wrapper {
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            overflow: hidden;
            background: #fff;
        }
        
        /* 自定义工具栏 */
        .editor-toolbar {
            border-bottom: 1px solid #e5e7eb;
            background: #f9fafb;
            padding: 6px 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            align-items: center;
        }
        
        .editor-toolbar button {
            padding: 5px 10px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            background: #fff;
            color: #374151;
            font-size: 13px;
            cursor: pointer;
            transition: all .2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 32px;
            height: 30px;
        }
        
        .editor-toolbar button:hover {
            border-color: #3b82f6;
            background: #eff6ff;
            color: #1d4ed8;
        }
        
        .editor-toolbar button:active {
            transform: scale(.96);
        }
        
        .editor-toolbar button.active {
            background: #dbeafe;
            border-color: #3b82f6;
            color: #1d4ed8;
        }
        
        .editor-toolbar .toolbar-divider {
            display: inline-block;
            width: 1px;
            height: 20px;
            background: #d1d5db;
            margin: 0 4px;
        }
        
        .editor-toolbar select {
            padding: 4px 8px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            background: #fff;
            font-size: 13px;
            color: #374151;
            cursor: pointer;
        }
        
        .editor-toolbar input[type="color"] {
            width: 28px;
            height: 28px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            padding: 2px;
            cursor: pointer;
            background: #fff;
        }
        
        /* iframe 编辑器 */
        #editorFrame {
            width: 100%;
            height: 520px;
            border: none;
            display: block;
        }
        
        /* 文章卡片悬停效果 */
        .article-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        
        /* 微信内容样式 - 设计原则：不覆盖任何内联样式
           只设置布局约束，让微信文章的原始样式完整展示 */
        .wechat-content {
            padding: 20px;
            overflow-x: hidden;
            background-color: #ffffff;
        }
        .wechat-content img {
            max-width: 100% !important;
            height: auto !important;
            display: block;
            margin: 10px auto;
        }
        .wechat-content video,
        .wechat-content iframe,
        .wechat-content embed,
        .wechat-content object {
            max-width: 100% !important;
            height: auto !important;
            display: block;
            margin: 10px auto;
        }
        .wechat-content table {
            max-width: 100% !important;
            overflow-x: auto;
        }
        .wechat-content hr {
            border: 0;
            border-top: 1px solid #e5e7eb;
            margin: 20px 0;
        }
        .wechat-content a {
            color: #576b95;
            text-decoration: none;
            word-break: break-all;
        }
        /* 修复内容区横向溢出（预览模态框） */
        #previewContent {
            overflow-x: hidden;
            word-break: break-word;
        }
        
        /* 浏览器框架样式 */
        .browser-frame {
            border: 1px solid #e5e7eb;
            border-radius: 0.5rem;
            overflow: hidden;
        }
        
        /* 三列网格布局 */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
        }
        
        @media (min-width: 1024px) {
            .main-grid {
                grid-template-columns: 33.333% 50% 16.666%;
            }
        }
        
        /* 布局容器 */
        .container {
            max-width: 80rem;
            margin-left: auto;
            margin-right: auto;
            padding-left: 1rem;
            padding-right: 1rem;
        }
        
        /* 导航栏 */
        .nav-bar {
            background: white;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid #e5e7eb;
            position: sticky;
            top: 0;
            z-index: 50;
        }
        
        /* 卡片样式 */
        .card {
            background: white;
            border-radius: 1rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            overflow: hidden;
        }
        
        /* 渐变背景 */
        .gradient-header {
            background: linear-gradient(to right, #22c55e, #2563eb);
            padding: 1.5rem;
        }
        
        /* 按钮样式 */
        .btn-primary {
            background: linear-gradient(to right, #22c55e, #16a34a);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }
        
        .btn-primary:hover {
            background: linear-gradient(to right, #16a34a, #15803d);
        }
        
        /* 输入框样式 */
        .input-field {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 0.875rem;
            line-height: 1.25rem;
        }
        
        .input-field:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.3);
            border-color: transparent;
        }
        
        /* 选项卡样式 */
        .tabs-container {
            display: flex;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .tab-btn {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            border: none;
            background: none;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.15s ease;
        }
        
        .tab-btn.active {
            color: #2563eb;
            border-bottom-color: #2563eb;
        }
        
        .tab-btn:not(.active) {
            color: #6b7280;
        }
        
        .tab-content {
            padding-top: 1rem;
        }
        
        /* 进度条 */
        .progress-bar-container {
            background: #e5e7eb;
            border-radius: 9999px;
            height: 0.75rem;
            overflow: hidden;
        }
        
        .progress-bar {
            background: linear-gradient(to right, #22c55e, #16a34a);
            height: 100%;
            border-radius: 9999px;
            transition: width 0.3s ease;
        }
        
        /* 文章列表区域 */
        .article-list-panel {
            transition: all 0.3s ease;
        }
        
        /* 文章列表 */
        .article-list {
            max-height: calc(100vh - 280px);
            overflow-y: auto;
        }
        
        /* 文章卡片 */
        .article-item {
            padding: 0.75rem;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: all 0.15s ease;
        }
        
        .article-item:hover {
            background-color: #f9fafb;
        }
        
        .article-item.active {
            background-color: #eff6ff;
            border-left-color: #3b82f6;
        }
        
        /* 按钮小徽章 */
        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 1.5rem;
            height: 1.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 700;
            color: white;
            background: linear-gradient(135deg, #22c55e, #2563eb);
        }
        
        /* 删除按钮 */
        .delete-btn {
            color: #9ca3af;
            padding: 0.25rem;
            border: none;
            background: none;
            cursor: pointer;
            border-radius: 0.5rem;
            transition: all 0.15s ease;
        }
        
        .delete-btn:hover {
            color: #ef4444;
            background-color: #fef2f2;
        }
        
        /* 工具按钮 */
        .tool-btn {
            padding: 0.5rem 1rem;
            font-size: 0.875rem;
            font-weight: 500;
            border-radius: 0.5rem;
            border: none;
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
        }
        
        .tool-btn-gray {
            background-color: #f3f4f6;
            color: #374151;
        }
        
        .tool-btn-gray:hover {
            background-color: #e5e7eb;
        }
        
        /* 隐藏 */
        .hidden {
            display: none !important;
        }
        
        /* 固定定位 */
        .fixed {
            position: fixed;
        }
        
        .inset-0 {
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
        }
        
        .z-50 {
            z-index: 50;
        }
        
        /* 最大宽度 */
        .max-w-md {
            max-width: 28rem;
        }
        
        .max-w-4xl {
            max-width: 56rem;
        }
        
        /* 最大高度 */
        .max-h-\[90vh\] {
            max-height: 90vh;
        }
        
        /* 溢出隐藏 */
        .overflow-hidden {
            overflow: hidden;
        }
        
        /* 阴影 */
        .shadow-2xl {
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        /* 背景透明度 - 仅作用于背景色，不影响子元素 */
        .bg-opacity-60 {
            background-color: rgba(0, 0, 0, 0.6);
        }
        
        /* 文章计数 */
        .count-badge {
            font-size: 0.75rem;
            background-color: #dbeafe;
            color: #1d4ed8;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-weight: 500;
        }
        
        /* 使用说明框 */
        .help-box {
            background-color: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 0.75rem;
            padding: 1rem;
        }
        
        /* 标题输入框 */
        .title-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid #d1d5db;
            border-radius: 0.75rem;
            font-size: 1.125rem;
            font-weight: 500;
        }
        
        .title-input:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
            border-color: transparent;
        }
        
        /* 两列输入 */
        .two-col-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        
        /* flex布局 */
        .flex {
            display: flex;
        }
        
        .flex-1 {
            flex: 1;
        }
        
        .flex-col {
            flex-direction: column;
        }
        
        .items-center {
            align-items: center;
        }
        
        .justify-between {
            justify-content: space-between;
        }
        
        .space-x-2 > * + * {
            margin-left: 0.5rem;
        }
        
        .space-x-3 > * + * {
            margin-left: 0.75rem;
        }
        
        .space-y-2 > * + * {
            margin-top: 0.5rem;
        }
        
        .mt-2 {
            margin-top: 0.5rem;
        }
        
        .mt-4 {
            margin-top: 1rem;
        }
        
        .mb-4 {
            margin-bottom: 1rem;
        }
        
        .mb-6 {
            margin-bottom: 1.5rem;
        }
        
        .p-4 {
            padding: 1rem;
        }
        
        .p-6 {
            padding: 1.5rem;
        }
        
        .px-4 {
            padding-left: 1rem;
            padding-right: 1rem;
        }
        
        .py-2 {
            padding-top: 0.5rem;
            padding-bottom: 0.5rem;
        }
        
        .py-4 {
            padding-top: 1rem;
            padding-bottom: 1rem;
        }
        
        .py-8 {
            padding-top: 2rem;
            padding-bottom: 2rem;
        }
        
        .rounded-lg {
            border-radius: 0.5rem;
        }
        
        .w-full {
            width: 100%;
        }
        
        /* 文本截断 */
        .truncate {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        /* 文本样式 */
        .text-white { color: white; }
        .text-gray-900 { color: #111827; }
        .text-gray-700 { color: #374151; }
        .text-gray-600 { color: #4b5563; }
        .text-gray-500 { color: #6b7280; }
        .text-blue-800 { color: #1e3a8a; }
        .text-blue-700 { color: #1d4ed8; }
        .text-blue-600 { color: #2563eb; }
        .text-gray-400 { color: #9ca3af; }
        .text-xs { font-size: 0.75rem; }
        .text-sm { font-size: 0.875rem; }
        .text-lg { font-size: 1.125rem; }
        .text-xl { font-size: 1.25rem; }
        .font-bold { font-weight: 700; }
        .font-medium { font-weight: 500; }
        
        .bg-white { background-color: white; }
        .bg-gray-50 { background-color: #f9fafb; }
        .bg-green-100 { background-color: #dcfce7; }
        .bg-blue-100 { background-color: #dbeafe; }
        .text-green-700 { color: #15803d; }
        
        /* 响应式 */
        @media (min-width: 1024px) {
            .lg-py-8 {
                padding-top: 2rem;
                padding-bottom: 2rem;
            }
            .lg-px-8 {
                padding-left: 2rem;
                padding-right: 2rem;
            }
        }
        
        /* 禁用按钮 */
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 最小宽度 */
        .min-w-0 {
            min-width: 0;
        }
        
        /* 分隔线 */
        .divide-y > * + * {
            border-top: 1px solid #f3f4f6;
        }
        
        /* 响应式布局 - 确保大屏幕 */
        @media (min-width: 1024px) {
            .lg-grid-cols-3 {
                display: grid;
                grid-template-columns: 33.333% 50% 16.666%;
            }
        }
        
        /* 浮动展开收起 */
        .collapse-panel.collapsed {
            width: 8.333% !important;
        }
        
        /* 面板模式切换动画 */
        #articleList {
            transition: all 0.3s ease;
        }
        
        #articleListCard {
            transition: all 0.3s ease;
        }
        
        /* 模式切换按钮 hover 效果 */
        #modeMouse:hover, #modeFixed:hover {
            cursor: pointer;
        }
        
        /* 文章列表项悬停优化 */
        .article-card {
            transition: all 0.2s ease;
        }
        
        /* 在鼠标模式下，卡片有轻微阴影提示可展开 */
        #articleListCard[data-mode="mouse"] {
            border: 2px solid transparent;
        }
        
        #articleListCard[data-mode="mouse"]:hover {
            border-color: #3b82f6;
        }
    </style>
</head>

    <script>
        // 简化的HTML转Markdown功能
        function simpleHtmlToMarkdown(html) {
            if (!html) return '';
            
            let markdown = html;
            
            markdown = markdown.replace(/<h1[^>]*>(.*?)<\/h1>/gi, '# $1\n\n');
            markdown = markdown.replace(/<h2[^>]*>(.*?)<\/h2>/gi, '## $1\n\n');
            markdown = markdown.replace(/<h3[^>]*>(.*?)<\/h3>/gi, '### $1\n\n');
            
            markdown = markdown.replace(/<strong[^>]*>(.*?)<\/strong>/gi, '**$1**');
            markdown = markdown.replace(/<b[^>]*>(.*?)<\/b>/gi, '**$1**');
            markdown = markdown.replace(/<em[^>]*>(.*?)<\/em>/gi, '*$1*');
            markdown = markdown.replace(/<i[^>]*>(.*?)<\/i>/gi, '*$1*');
            
            markdown = markdown.replace(/<a[^>]*href="([^"]+)"[^>]*>(.*?)<\/a>/gi, '[$2]($1)');
            
            markdown = markdown.replace(/<img[^>]*src="([^"]+)"[^>]*alt="([^"]+)"[^>]*>/gi, '![$2]($1)');
            markdown = markdown.replace(/<img[^>]*src="([^"]+)"[^>]*>/gi, '![]($1)');
            
            markdown = markdown.replace(/<p[^>]*>(.*?)<\/p>/gi, '$1\n\n');
            
            markdown = markdown.replace(/<br\s*\/?>/gi, '\n');
            
            markdown = markdown.replace(/<ul[^>]*>(.*?)<\/ul>/gis, function(match, content) {
                let items = content.match(/<li[^>]*>(.*?)<\/li>/gi);
                if (items) {
                    return items.map(item => '- ' + item.replace(/<li[^>]*>(.*?)<\/li>/i, '$1')).join('\n') + '\n\n';
                }
                return match;
            });
            
            markdown = markdown.replace(/<ol[^>]*>(.*?)<\/ol>/gis, function(match, content) {
                let items = content.match(/<li[^>]*>(.*?)<\/li>/gi);
                if (items) {
                    return items.map((item, i) => (i+1) + '. ' + item.replace(/<li[^>]*>(.*?)<\/li>/i, '$1')).join('\n') + '\n\n';
                }
                return match;
            });
            
            markdown = markdown.replace(/<[^>]+>/g, '');
            
            markdown = markdown.replace(/&nbsp;/g, ' ');
            markdown = markdown.replace(/&lt;/g, '<');
            markdown = markdown.replace(/&gt;/g, '>');
            markdown = markdown.replace(/&amp;/g, '&');
            markdown = markdown.replace(/&quot;/g, '"');
            
            markdown = markdown.replace(/\n\s*\n\s*\n/g, '\n\n');
            markdown = markdown.trim();
            
            return markdown;
        }
    </script>
